environment:
  action_space_size: 7
  actions:
    0:
      name: hold
      pct_change: 0.0
    1:
      name: price_up_2pct
      pct_change: 0.02
    2:
      name: price_up_5pct
      pct_change: 0.05
    3:
      name: price_down_2pct
      pct_change: -0.02
    4:
      name: price_down_5pct
      pct_change: -0.05
    5:
      name: price_down_10pct
      pct_change: -0.1
    6:
      name: price_down_15pct
      pct_change: -0.15
  episode_length: 52
  masking:
    no_consecutive_deep_cuts: true
    no_updown_oscillation_periods: 2
  observation_lag: 0
  stickiness_threshold_periods: 8
evaluation:
  ab_test:
    confidence_level: 0.95
    n_simulations: 100
    split_ratio: 0.5
monitoring:
  action_entropy_min: 0.5
  alert_consecutive_periods: 3
  reward_drift_sigma: 2.0
multi_agent:
  guardian:
    restricted_actions:
    - 0
    - 1
    - 2
    - 3
  portfolio_manager:
    css_routing:
      contested:
      - 3
      guardian:
      - 4
      - 5
      scout:
      - 1
      - 2
    reallocation_period: 4
  scout:
    exploration_bonus: 0.1
reward:
  clv_optimizer:
    alpha_by_css:
      css_1: 0.3
      css_2: 0.35
      css_3: 0.5
      css_4: 0.6
      css_5: 0.7
    beta_by_css:
      css_1: 0.5
      css_2: 0.45
      css_3: 0.3
      css_4: 0.2
      css_5: 0.15
    churn_thresholds:
      css_1: 0.4
      css_2: 0.4
      css_3: 0.25
      css_4: 0.15
      css_5: 0.15
    delta: 2.0
    gamma: 10.0
    lifetime_discount_by_css:
      css_1: 0.5
      css_2: 0.6
      css_3: 0.8
      css_4: 0.9
      css_5: 1.0
    volatility_max_changes: 2
    volatility_window: 4
  margin_maximizer: {}
  portfolio_optimizer:
    action_concentration_penalty: 3.0
    css_migration_bonus: 5.0
synthetic_data:
  annual_churn_baseline: 0.07
  churn_css_multiplier:
    css_1: 2.0
    css_2: 1.5
    css_3: 1.0
    css_4: 0.7
    css_5: 0.5
  concepts:
  - elasticity_modifier: 1.2
    name: qsr
    weight: 0.3
  - elasticity_modifier: 1.0
    name: casual_dining
    weight: 0.25
  - elasticity_modifier: 0.7
    name: fine_dining
    weight: 0.15
  - elasticity_modifier: 0.9
    name: institutional
    weight: 0.2
  - elasticity_modifier: 0.8
    name: healthcare
    weight: 0.1
  css_distribution:
    css_1: 0.1
    css_2: 0.1
    css_3: 0.4
    css_4: 0.25
    css_5: 0.15
  elasticity:
    by_css:
      css_1:
        mean: -2.5
        std: 0.5
      css_2:
        mean: -2.0
        std: 0.4
      css_3:
        mean: -1.5
        std: 0.3
      css_4:
        mean: -1.0
        std: 0.25
      css_5:
        mean: -0.7
        std: 0.2
    css_correlation: -0.4
  n_customers: 10000
  percentile_benchmarks:
    cases_p50_monthly: 60
    dm_dollars_p50_monthly: 665
    dm_pct_p50: 0.24
    sales_p50_monthly: 3000
  perks_penetration: 0.15
  seasonality:
    q1_modifier: 0.85
    q2_modifier: 1.0
    q3_modifier: 1.05
    q4_modifier: 1.15
  syw_css_skew:
  - 0.1
  - 0.15
  - 0.3
  - 0.4
  - 0.5
  syw_penetration: 0.3
training:
  checkpoint_freq: 50000
  dqn:
    batch_size: 32
    buffer_size: 100000
    exploration_final_eps: 0.05
    exploration_fraction: 0.3
    gamma: 0.99
    learning_rate: 0.0001
    learning_starts: 1000
  early_stopping_patience: 50000
  eval_freq: 10000
  log_dir: results/tensorboard
  model_dir: results/models
  ppo:
    batch_size: 64
    clip_range: 0.2
    gamma: 0.99
    learning_rate: 0.0003
    n_epochs: 10
    n_steps: 2048
  timesteps: 500000
